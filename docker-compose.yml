services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    volumes:
      - /mnt/services/adguard/work:/opt/adguardhome/work
      - /mnt/services/adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:8081/tcp"
      - "3001:3000/tcp"
